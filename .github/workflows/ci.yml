# ТЗ §45: базовый CI — мессенджер (web) + сервер
name: CI
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  desktop-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DierCHAT-Desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: DierCHAT-Desktop/package-lock.json
      - run: npm ci
      - run: npm run build:web

  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DierCHAT-Server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go build -o /tmp/dierchat-server ./cmd/server

# Продакшен на VPS: скопируйте config.deploy.example.json → config.json, задайте пароли и cdn_base_url.
# Сборка образа подхватит ./config.json. См. ../HOSTING.md

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dierchat
      POSTGRES_USER: dierchat
      POSTGRES_PASSWORD: dierchat
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  server:
    build: .
    ports:
      # Должен совпадать с server.port в config.json (по умолчанию 9000)
      - "9000:9000"
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ./media:/app/media
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:

# DierCHAT — Nginx → Go на 127.0.0.1:9000 (SPA + /api + /media + /ws)
# Домен: dier-chat.ru, прямой IP VPS в server_name — чтобы открывалось http://31.148.99.40/
# TLS: certbot --nginx -d dier-chat.ru -d www.dier-chat.ru
# См. также: deploy/nginx-dierchat-https.example.conf

upstream dierchat_backend {
    keepalive 32;
    server 127.0.0.1:9000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name dier-chat.ru www.dier-chat.ru 31.148.99.40;

    client_max_body_size 2048M;

    location / {
        proxy_pass http://dierchat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}

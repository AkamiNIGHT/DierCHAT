# Пример nginx для DierCHAT (HTTPS + API + WebSocket + медиа + статика веб-клиента)
# Скопируйте в sites-available, поправьте server_name и пути, затем certbot --nginx

upstream dierchat_backend {
    server 127.0.0.1:9000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dier-chat.ru www.dier-chat.ru;

    # ssl_certificate /etc/letsencrypt/live/dier-chat.ru/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/dier-chat.ru/privkey.pem;

    client_max_body_size 2048M;

    # Статика веб-клиента (после: cd DierCHAT-Desktop && npm run build:web:host)
    root /var/www/dierchat;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://dierchat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket на том же Go-сервере (GET /ws)
    location /ws {
        proxy_pass http://dierchat_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /media/ {
        proxy_pass http://dierchat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name dier-chat.ru www.dier-chat.ru;
    return 301 https://$host$request_uri;
}

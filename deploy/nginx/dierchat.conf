# Алиас: тот же шаблон, что и deploy/nginx-dierchat.conf (в архив кладётся nginx-dierchat.conf).
# Полная копия для документации — правьте deploy/nginx-dierchat.conf как основной файл пакета.

upstream dierchat_backend {
    keepalive 32;
    server 127.0.0.1:9000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name dier-chat.ru www.dier-chat.ru 31.148.99.40;

    client_max_body_size 2048M;

    location / {
        proxy_pass http://dierchat_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }
}
